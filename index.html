<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taher Mangal Mahudi - UI/UX Designer</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- React & ReactDOM (UMD) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel (Standalone) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset('classic-react', {
      presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]]
    });
  </script>

  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
</head>

<body>
  <div id="root"></div>

  <!-- Main App Script -->
  <script type="text/babel" data-presets="classic-react" src="app.jsx"></script>
</body>

</html>
